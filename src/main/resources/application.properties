spring.application.name=bidmart-catalogue-service
spring.profiles.default=local
server.port=${PORT:${SERVER_PORT:8081}}
spring.config.import=optional:file:.env[.properties],optional:file:../bidmart-infrastructure/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bidmart_catalogue}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:password}}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672}
bidmart.rabbitmq.events-exchange=${BIDMART_EVENTS_EXCHANGE:bidmart.events}
bidmart.rabbitmq.catalogue.auction-events-queue=${CATALOGUE_AUCTION_EVENTS_QUEUE:catalogue.auction-events}
